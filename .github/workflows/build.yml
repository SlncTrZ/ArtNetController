name: Build and Release

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags (v1.0.0, v2.0.0, etc.)
  workflow_dispatch:  # Allow manual trigger

env:
  APP_NAME: ArtNetController
  PYTHON_VERSION: '3.11'

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      
      - name: Build Windows executable
        run: python build_windows.py
      
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/*.exe
            dist/*.zip
            dist/SHA256SUMS.txt
          retention-days: 7

  build-linux:
    name: Build Linux (Raspberry Pi)
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Build Debian package
        run: python build_raspberry.py
      
      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            dist/*.deb
            dist/*.sha256
          retention-days: 7

  create-release:
    name: Create GitHub Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: artifacts/windows
      
      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-build
          path: artifacts/linux
      
      - name: Extract version from tag
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
      
      - name: Generate release notes
        id: release_notes
        run: |
          cat > release_notes.md << 'EOF'
          ## What's New in v${{ steps.get_version.outputs.version }}
          
          ### Features
          - 🔄 **Automatic Updates**: Check for and install updates from GitHub Releases
          - ⚙️ **Configuration Manager**: Centralized config management with migration support
          - 🐛 **Crash Reporting**: Automatic error logging and GitHub issue reporting
          - 📦 **Professional Installers**: Native packages for Windows and Raspberry Pi
          
          ### Installation
          
          #### Windows
          1. Download `ArtNetController-${{ steps.get_version.outputs.version }}-Setup.exe`
          2. Run installer
          3. Launch from Start Menu
          
          Or use portable version:
          1. Download `ArtNetController-${{ steps.get_version.outputs.version }}-Portable.zip`
          2. Extract anywhere
          3. Run `ArtNetController.exe`
          
          #### Raspberry Pi / Debian
          ```bash
          wget https://github.com/${{ github.repository }}/releases/download/v${{ steps.get_version.outputs.version }}/artnetcontroller_${{ steps.get_version.outputs.version }}_armhf.deb
          sudo dpkg -i artnetcontroller_${{ steps.get_version.outputs.version }}_armhf.deb
          sudo apt-get install -f  # Fix dependencies
          ```
          
          ### Requirements
          
          **Windows:**
          - Windows 10 or later
          - No additional software required
          
          **Raspberry Pi:**
          - Raspberry Pi OS (Debian 11+)
          - Python 3.9+
          - PyQt6, psutil (auto-installed)
          
          ### Checksums
          
          Verify file integrity with SHA256:
          ```bash
          sha256sum -c SHA256SUMS.txt
          ```
          
          ### Support
          - 📖 [Documentation](https://github.com/${{ github.repository }}/wiki)
          - 🐛 [Report Issues](https://github.com/${{ github.repository }}/issues)
          - 💬 [Discussions](https://github.com/${{ github.repository }}/discussions)
          
          ### Changelog
          See [CHANGELOG.md](CHANGELOG.md) for detailed changes.
          EOF
          
          cat release_notes.md
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release v${{ steps.get_version.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: |
            artifacts/windows/*.exe
            artifacts/windows/*.zip
            artifacts/windows/SHA256SUMS.txt
            artifacts/linux/*.deb
            artifacts/linux/*.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Notify success
        run: |
          echo "✅ Release v${{ steps.get_version.outputs.version }} created successfully!"
          echo "📦 Artifacts uploaded to GitHub Releases"
          echo "🔗 https://github.com/${{ github.repository }}/releases/tag/v${{ steps.get_version.outputs.version }}"

  test-installation:
    name: Test Installation
    needs: [build-windows, build-linux]
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
    
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Download Windows artifacts
        if: matrix.os == 'windows-latest'
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: artifacts
      
      - name: Download Linux artifacts
        if: matrix.os == 'ubuntu-latest'
        uses: actions/download-artifact@v4
        with:
          name: linux-build
          path: artifacts
      
      - name: Test Windows installation
        if: matrix.os == 'windows-latest'
        run: |
          Write-Host "Testing Windows portable version..."
          Expand-Archive artifacts/*.zip -DestinationPath test_install
          if (Test-Path "test_install/ArtNetController/ArtNetController.exe") {
            Write-Host "✅ Executable found"
          } else {
            Write-Host "❌ Executable not found"
            exit 1
          }
      
      - name: Test Linux package
        if: matrix.os == 'ubuntu-latest'
        run: |
          echo "Testing Debian package..."
          dpkg-deb --info artifacts/*.deb
          dpkg-deb --contents artifacts/*.deb
          echo "✅ Package structure valid"
